<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Clover</title>
    <link rel="stylesheet" type="text/css" href="../css/reset.css" />
    <link rel="stylesheet" type="text/css" href="../css/styles.css" />
    <link rel="shortcut icon" type="image/x-icon" href="../src/img/bclogo.png" />
</head>

<body>
    <!-- Logo do Black Clover -->
    <header class="header_logo">
        <img src="../src/img/bclogo.png" alt="Black Clover Logo" title="Black Clover Logo">
    </header>
    <!-- Menu -->
    <main>
        <nav class="menu_principal">
            <a href="../index.html">Inicio</a>
            <a href="./sobre.html">Sobre</a>
            <a href="./personagens.html">Personagens</a>
            <a href="./adaptacoes.html">Adaptações</a>
            <a href="./material_original.html">Material Original</a>
            <a href="./universo.html">Universo</a>
            <a href="./fale_conosco.html">Fale Conosco</a>

        </nav>
        <!-- Banner do Black Clover-->
        <div class="banner">
            <img src="../src/img/bcbanner.jpg" alt="Black Clover Banner" title="Black Clover Banner">
        </div>
        <!-- Conteúdo Principal -->
        <h1 align="center">Fale Conosco</h1>
        <form action="../index.html" method="post">
            <table align="center" width="500px" height="auto" border="1">
                <thead>
                    <tr>
                        <td colspan="2" align="center">
                            <h3>* Todos os campos são obrigatórios</h3>
                        </td>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td align="right">
                            <h3>*Nome:</h3>
                        </td>
                        <td align="left">
                            <input type="text" name="nome" required maxlength="20">
                        </td>
                    </tr>
                    <tr>
                        <td align="right">
                            <h3>*Data de nascimento:</h3>
                        </td>
                        <td align="left">
                            <input type="date" name="data" required>
                        </td>
                    </tr>
                    <tr>
                        <td align="right">
                            <h3>*Telefone:</h3>
                        </td>
                        <td align="left">
                            <input type="tel" name="telefone" required maxlength="11">
                        </td>
                    </tr>
                    <tr>
                        <td align="right">
                            <h3>*E-mail:</h3>
                        </td>
                        <td align="left">
                            <input type="email" name="email" required placeholder="nome@dominio.com">
                        </td>
                    </tr>
                    <tr>
                        <td align="right">
                            <h3>*Usuário:</h3>
                        </td>
                        <td align="left">
                            <input type="text" name="usuario" required>
                        </td>
                    </tr>
                    <tr>
                        <td align="right">
                            <h3>*Mensagem:</h3>
                        </td>
                        <td align="left">
                            <textarea name="obs" rows="6" cols="30" required></textarea>
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td align="center" colspan="2">
                            <input type="submit" name="enviar" value="Enviar">
                            <input type="reset" name="limpar" value="Limpar">
                        </td>
                    </tr>
                </tfoot>
            </table>
        </form>
    </main>
    <footer>
        <!-- Logo do Black Clover -->
        <div class="header_logo">
            <img src="../src/img/bclogo.png" alt="Black Clover Logo" title="Black Clover Logo">
            <br>
        </div>
        <!-- Direitos -->
        <div>
            <p>© 2026 Black Clover Fan Page. Todos os direitos reservados.</p>
        </div>
    </footer>
</body>

</html>
