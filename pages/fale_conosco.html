<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Clover</title>
    <link rel="stylesheet" type="text/css" href="../css/reset.css" />
    <link rel="stylesheet" type="text/css" href="../css/global.css" />
    <link rel="stylesheet" type="text/css" href="../css/styles.css" />
    <link rel="stylesheet" type="text/css" href="../css/fale.css" />
    <link rel="shortcut icon" type="image/x-icon" href="../src/img/bclogo.png" />
</head>

<body>
    <!-- Logo do Black Clover -->
    <header class="header_logo">
        <img src="../src/img/bclogo.png" alt="Black Clover Logo" title="Black Clover Logo">
    </header>
    <!-- Menu -->
    <main>
        <nav class="menu_principal">
            <a href="../index.html">Inicio</a>
            <a href="./sobre.html">Sobre</a>
            <a href="./personagens.html">Personagens</a>
            <a href="./adaptacoes.html">Adaptações</a>
            <a href="./material_original.html">Material Original</a>
            <a href="./universo.html">Universo</a>
            <a href="./fale_conosco.html">Fale Conosco</a>

        </nav>
        <!-- Banner do Black Clover-->
        <div class="banner">
            <img src="../src/img/bcbanner.jpg" alt="Black Clover Banner" title="Black Clover Banner">
        </div>
        <!-- Conteúdo Principal -->
        <section class="secao_contato">
            <div class="contato_container">
                <h1>Fale Conosco</h1>
                <p class="aviso">* Todos os campos são obrigatórios</p>
                
                <form action="../index.html" method="post" class="form_contato">
                    <div class="campo">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" name="nome" required maxlength="20">
                    </div>
        
                    <div class="campo_grupo">
                        <div class="campo">
                            <label for="data">Nascimento:</label>
                            <input type="date" id="data" name="data" required>
                        </div>
                        <div class="campo">
                            <label for="telefone">Telefone:</label>
                            <input type="tel" id="telefone" name="telefone" required maxlength="11">
                        </div>
                    </div>
        
                    <div class="campo">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email" required placeholder="nome@dominio.com">
                    </div>
        
                    <div class="campo">
                        <label for="usuario">Usuário:</label>
                        <input type="text" id="usuario" name="usuario" required>
                    </div>
        
                    <div class="campo">
                        <label for="obs">Mensagem:</label>
                        <textarea id="obs" name="obs" rows="6" required></textarea>
                    </div>
        
                    <div class="botoes">
                        <button type="submit" class="btn_enviar">Enviar Feitiço</button>
                        <button type="reset" class="btn_limpar">Limpar</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <!-- Logo do Black Clover -->
        <div class="header_logo">
            <img src="../src/img/bclogo.png" alt="Black Clover Logo" title="Black Clover Logo">
            <br>
        </div>
        <!-- Direitos -->
        <div>
            <p>© 2026 Black Clover Fan Page. Todos os direitos reservados.</p>
        </div>
    </footer>
</body>

</html>
